name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  component-validation:
    name: component-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run black-box validation suite
        run: python3 tests/run_validation.py

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: tests/artifacts/

  integration-readiness:
    name: integration-readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node MCP wrapper dependencies
        working-directory: app
        run: npm ci

      - name: Run integration readiness smokes
        run: bash integrations/run_readiness.sh

  phase6-readiness:
    name: phase6-readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node MCP wrapper dependencies
        working-directory: app
        run: npm ci

      - name: Run Phase 6 release readiness gate
        run: bash examples/claude-code/demo/phase6-readiness.sh

  benchmarks:
    name: benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run research benchmarks (strict)
        run: python3 benchmarks/run_benchmarks.py --strict

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/artifacts/
