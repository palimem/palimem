name: Set repository topics

on:
  workflow_dispatch:

jobs:
  topics:
    runs-on: ubuntu-latest
    steps:
      - name: Apply repository topics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X PUT "repos/${{ github.repository }}/topics" \
            -f names='["mcp","ai-agents","memory","claude","cursor","local-first","sqlite","coding-agents","agent-memory","mcp-server"]' \
            -H "Accept: application/vnd.github.mercy-preview+json"
